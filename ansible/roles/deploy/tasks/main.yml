---
- name: Create application directory
  file:
    path: /opt/project3
    state: directory
    owner: sergeymazov
    group: docker
    mode: '0755'

- name: Create data directory for images
  file:
    path: /opt/project3/images
    state: directory
    owner: sergeymazov
    group: docker
    mode: '0777'

- name: Copy docker-compose.yml to server
  template:
    src: docker-compose.yml.j2
    dest: /opt/project3/docker-compose.yml
    mode: '0644'

- name: Login to GitHub Container Registry
  docker_login:
    registry_url: ghcr.io
    username: "{{ ghcr_username }}"
    password: "{{ ghcr_password }}"

- name: Pull latest Docker images
  docker_compose:
    project_src: /opt/project3
    files:
      - docker-compose.yml
    pull: yes

- name: Run migrations
  docker_compose:
    project_src: /opt/project3
    files:
      - docker-compose.yml
    services:
      - migrate
    state: present

- name: Start all services
  docker_compose:
    project_src: /opt/project3
    files:
      - docker-compose.yml
    state: present