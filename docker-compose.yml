version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: project3-postgres
    environment:
      POSTGRES_DB: bulletins
      POSTGRES_USER: bulletin_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bulletin_user -d bulletins"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/otfantik/project-devops-deploy:latest
    container_name: project3-migrate
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bulletins
      SPRING_DATASOURCE_USERNAME: bulletin_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ghcr.io/otfantik/project-devops-deploy:latest
    container_name: project3-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bulletins
      SPRING_DATASOURCE_USERNAME: bulletin_user
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - /opt/project3/images:/tmp/bulletin-images
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data: